name: Bug Report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happened, and what did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the bug
      placeholder: |
        1. Go to '...'
        2. Paste link '...'
        3. Click '...'
        4. See error
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Input URL or file type
      description: What URL or file type triggers the issue?
  - type: textarea
    id: logs
    attributes:
      label: Error logs
      description: Paste any error messages or terminal output
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: macOS 15 / Windows 11 / Ubuntu 24.04
        - Python version: 3.12
        - Browser: Chrome 130
        - Installation method: Docker / Manual / Desktop app
    validations:
      required: true
